<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1117" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self'; base-uri 'none'; form-action 'none'"
    />
    <title>لا يوجد اتصال بالإنترنت | وكيل</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f1117;
        color: #f7f8fa;
        padding: 1.5rem;
      }
      main {
        width: min(100%, 32rem);
        border: 1px solid #303542;
        border-radius: 1rem;
        background: #171a22;
        padding: 2rem 1.5rem;
        text-align: center;
        box-shadow: 0 1rem 3rem rgb(0 0 0 / 25%);
      }
      img {
        width: 4rem;
        height: 4rem;
        border-radius: 1rem;
      }
      h1 {
        margin: 1rem 0 0.75rem;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        color: #b7bdc9;
        line-height: 1.8;
      }
      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 1.5rem;
        border-radius: 0.75rem;
        background: #7c5cff;
        color: white;
        padding: 0.7rem 1.25rem;
        font-weight: 700;
        text-decoration: none;
      }
      a:focus-visible {
        outline: 3px solid #bcaeff;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" width="64" height="64" />
      <h1>لا يوجد اتصال بالإنترنت</h1>
      <p>
        تحقق من اتصالك ثم حاول مرة أخرى. لا تُعرض المشاريع أو البيانات الخاصة من التخزين المؤقت.
      </p>
      <a href="/new">إعادة المحاولة</a>
    </main>
  </body>
</html>
