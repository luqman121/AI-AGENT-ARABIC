packages:
  - apps/*
  - packages/*

allowBuilds:
  cpu-features: false
  esbuild: true
  msgpackr-extract: false
  protobufjs: false
  sharp: true
  ssh2: false
  unrs-resolver: true

minimumReleaseAgeExclude:
  - lucide-react@1.25.0
  - "@tailwindcss/node@4.3.3"
  - "@tailwindcss/oxide-android-arm64@4.3.3"
  - "@tailwindcss/oxide-darwin-arm64@4.3.3"
  - "@tailwindcss/oxide-darwin-x64@4.3.3"
  - "@tailwindcss/oxide-freebsd-x64@4.3.3"
  - "@tailwindcss/oxide-linux-arm-gnueabihf@4.3.3"
  - "@tailwindcss/oxide-linux-arm64-gnu@4.3.3"
  - "@tailwindcss/oxide-linux-arm64-musl@4.3.3"
  - "@tailwindcss/oxide-linux-x64-gnu@4.3.3"
  - "@tailwindcss/oxide-linux-x64-musl@4.3.3"
  - "@tailwindcss/oxide-wasm32-wasi@4.3.3"
  - "@tailwindcss/oxide-win32-arm64-msvc@4.3.3"
  - "@tailwindcss/oxide-win32-x64-msvc@4.3.3"
  - "@tailwindcss/oxide@4.3.3"
  - "@tailwindcss/postcss@4.3.3"
  - tailwindcss@4.3.3
  - "@aws-sdk/client-s3@3.1090.0"
  - "@aws-sdk/s3-request-presigner@3.1090.0"
  - "@daytona/analytics-api-client@0.199.0"
  - "@daytona/api-client@0.199.0"
  - "@daytona/sdk@0.199.0"
  - "@daytona/toolbox-api-client@0.199.0"

# Auth.js 5 beta still declares a Nodemailer 7 peer while the security fix is
# released in Nodemailer 9. Keep one audited runtime version until Auth.js
# widens its peer range. Next's older PostCSS pin is likewise forced to the
# compatible patched 8.x line.
overrides:
  nodemailer: 9.0.1
  postcss@<8.5.10: 8.5.19

packageExtensions:
  "@auth/core@0.41.2":
    peerDependencies:
      nodemailer: ">=7.0.7 <10"
  "next-auth@5.0.0-beta.31":
    peerDependencies:
      nodemailer: ">=7.0.7 <10"
