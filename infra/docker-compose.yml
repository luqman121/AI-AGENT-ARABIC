name: wakil

services:
  postgres:
    image: postgres:17.10-alpine3.23
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wakil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wakil_local_only}
      POSTGRES_USER: ${POSTGRES_USER:-wakil}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7.4.9-alpine3.21
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-wakil_local_secret_key}
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-wakil_local_access_key}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    profiles: ["tools"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-wakil_local_secret_key}
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-wakil_local_access_key}
      S3_BUCKET: ${S3_BUCKET:-wakil-dev}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        >/dev/null && mc mb --ignore-existing "local/$${S3_BUCKET}" >/dev/null && mc anonymous set
        none "local/$${S3_BUCKET}" >/dev/null && policy="$$(mc anonymous get "local/$${S3_BUCKET}")"
        && case "$$policy" in *private*) exit 0 ;; *) echo "Bucket policy is not private." >&2; exit
        1 ;; esac
    restart: "no"

  mailpit:
    image: axllent/mailpit:v1.30.4
    restart: unless-stopped
    environment:
      MP_DATABASE: /data/mailpit.db
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    volumes:
      - mailpit-data:/data
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  mailpit-data:
  minio-data:
  postgres-data:
  redis-data:
