name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      AUTH_SECRET: ci-placeholder-ci-placeholder-1234567890
      AUTH_URL: https://ci.wakil.invalid
      DATABASE_URL: postgres://wakil:ci_only@127.0.0.1:5432/wakil
      DAYTONA_API_KEY: ci-placeholder
      EMAIL_FROM: no-reply@wakil.invalid
      MODEL_INPUT_COST_MICROS_PER_MILLION_TOKENS: 1
      MODEL_OUTPUT_COST_MICROS_PER_MILLION_TOKENS: 1
      NODE_ENV: test
      OPENROUTER_API_KEY: ci-placeholder
      OPENROUTER_MODEL: ci-placeholder
      REDIS_URL: redis://127.0.0.1:6379
      S3_BUCKET: wakil-ci
      S3_ENDPOINT: https://00000000000000000000000000000000.r2.cloudflarestorage.com
      SMTP_HOST: smtp.wakil.invalid
      SMTP_PORT: 465
      TURBO_TELEMETRY_DISABLED: 1
      WAKIL_IMAGE_TAG: ci
      WEB_S3_ACCESS_KEY_ID: ci-placeholder
      WEB_S3_SECRET_ACCESS_KEY: ci-placeholder
      WORKER_S3_ACCESS_KEY_ID: ci-placeholder
      WORKER_S3_SECRET_ACCESS_KEY: ci-placeholder
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.1

      - name: Activate pinned pnpm
        run: |
          corepack enable
          corepack install

      - name: Resolve pnpm store
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Compose configuration
        run: docker compose -f infra/docker-compose.yml config --quiet

      - name: Validate production Compose configuration
        run: docker compose -f infra/docker-compose.production.yml config --quiet

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Migration integration tests
        run: pnpm test:integration:migrations

      - name: Service integration tests
        run: pnpm test:integration

      - name: Build
        run: pnpm build

      - name: Build production web image
        run: docker build --target web --tag wakil-web:ci .

      - name: Build production worker image
        run: docker build --target worker --tag wakil-worker:ci .

      - name: Build production migration image
        run: docker build --target migrate --tag wakil-migrate:ci .

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-artifacts
          if-no-files-found: ignore
          path: |
            **/coverage/**
            artifacts/**
            test-results/**
